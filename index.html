<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Private Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 32px;
        }
        
        .add-form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .add-form input {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .add-form input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-add {
            background: #667eea;
            color: white;
        }
        
        .btn-add:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }
        
        .btn-delete {
            background: #ef4444;
            color: white;
            padding: 8px 16px;
            font-size: 12px;
        }
        
        .btn-delete:hover {
            background: #dc2626;
        }
        
        .sites-list {
            list-style: none;
        }
        
        .site-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 16px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        
        .site-item:hover {
            background: #f3f4f6;
            transform: translateX(4px);
        }
        
        .site-link {
            flex: 1;
            text-decoration: none;
            color: #333;
        }
        
        .site-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        
        .site-url {
            font-size: 13px;
            color: #666;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 My Sites</h1>
        
        <div class="add-form">
            <input type="text" id="siteName" placeholder="Site name (e.g., Baby vs Books)">
            <input type="url" id="siteUrl" placeholder="URL (e.g., https://babyvsbooks.benwiddowson.com)">
            <button class="btn btn-add" onclick="addSite()">Add Site</button>
        </div>
        
        <ul class="sites-list" id="sitesList">
            <!-- Sites will be added here -->
        </ul>
        
        <div class="empty-state" id="emptyState" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
            </svg>
            <p>No sites yet. Add your first site above!</p>
        </div>
    </div>

    <script>
        // Load sites from localStorage
        let sites = JSON.parse(localStorage.getItem('sites')) || [];
        
        function renderSites() {
            const list = document.getElementById('sitesList');
            const emptyState = document.getElementById('emptyState');
            
            if (sites.length === 0) {
                list.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            list.innerHTML = sites.map((site, index) => `
                <li class="site-item">
                    <a href="${site.url}" class="site-link" target="_blank">
                        <div class="site-name">${site.name}</div>
                        <div class="site-url">${site.url}</div>
                    </a>
                    <button class="btn btn-delete" onclick="deleteSite(${index})">Delete</button>
                </li>
            `).join('');
        }
        
        function addSite() {
            const nameInput = document.getElementById('siteName');
            const urlInput = document.getElementById('siteUrl');
            
            const name = nameInput.value.trim();
            const url = urlInput.value.trim();
            
            if (!name || !url) {
                alert('Please fill in both fields');
                return;
            }
            
            // Add https:// if missing
            const fullUrl = url.startsWith('http') ? url : 'https://' + url;
            
            sites.push({ name, url: fullUrl });
            localStorage.setItem('sites', JSON.stringify(sites));
            
            nameInput.value = '';
            urlInput.value = '';
            
            renderSites();
        }
        
        function deleteSite(index) {
            if (confirm('Are you sure you want to delete this site?')) {
                sites.splice(index, 1);
                localStorage.setItem('sites', JSON.stringify(sites));
                renderSites();
            }
        }
        
        // Allow Enter key to add site
        document.getElementById('siteUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addSite();
            }
        });
        
        // Initial render
        renderSites();
    </script>
</body>
</html>
